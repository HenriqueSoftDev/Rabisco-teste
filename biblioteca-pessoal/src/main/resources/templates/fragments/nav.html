<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
      <i class="bi bi-book-half me-1"></i>Minha Biblioteca
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid me-1"></i>Acervo</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/books/new}"><i class="bi bi-plus-circle me-1"></i>Adicionar</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/books/lookup}"><i class="bi bi-search me-1"></i>Buscar por ISBN</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small" sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" class="m-0">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-outline-light btn-sm">
            <i class="bi bi-box-arrow-right me-1"></i>Sair
          </button>
        </form>
      </div>
    </div>
  </div>
</nav>
</body>
</html>
