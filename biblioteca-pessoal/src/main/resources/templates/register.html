<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Cadastro — Minha Biblioteca</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bg-body-secondary min-vh-100 d-flex align-items-center py-4">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="text-center mb-4">
        <i class="bi bi-book-half display-3 text-primary"></i>
        <h1 class="h3 fw-bold mt-2">Minha Biblioteca</h1>
      </div>
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h2 class="h5 mb-4">Criar conta</h2>

          <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

          <form th:action="@{/register}" th:object="${registerRequest}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
              <label for="username" class="form-label">Usuário <span class="text-danger">*</span></label>
              <input id="username" th:field="*{username}" type="text"
                     th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                     class="form-control" placeholder="mínimo 3 caracteres" required autofocus/>
              <div th:if="${#fields.hasErrors('username')}" class="invalid-feedback"
                   th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
              <input id="email" th:field="*{email}" type="email"
                     th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                     class="form-control" placeholder="voce@email.com" required/>
              <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback"
                   th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Senha <span class="text-danger">*</span></label>
              <input id="password" th:field="*{password}" type="password"
                     th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                     class="form-control" placeholder="mínimo 6 caracteres" required/>
              <div th:if="${#fields.hasErrors('password')}" class="invalid-feedback"
                   th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirmar Senha <span class="text-danger">*</span></label>
              <input id="confirmPassword" th:field="*{confirmPassword}" type="password"
                     th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                     class="form-control" placeholder="repita a senha" required/>
              <div th:if="${#fields.hasErrors('confirmPassword')}" class="invalid-feedback"
                   th:errors="*{confirmPassword}"></div>
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg">Criar conta</button>
            </div>
          </form>
        </div>
      </div>
      <p class="text-center mt-3 text-muted">
        Já tem conta? <a th:href="@{/login}" class="text-decoration-none">Entrar</a>
      </p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
