<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — Minha Biblioteca</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bg-body-secondary min-vh-100 d-flex align-items-center">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="text-center mb-4">
        <i class="bi bi-book-half display-3 text-primary"></i>
        <h1 class="h3 fw-bold mt-2">Minha Biblioteca</h1>
      </div>
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h2 class="h5 mb-4">Entrar</h2>

          <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
          <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>

          <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
              <label for="username" class="form-label">Usuário</label>
              <input id="username" name="username" type="text"
                     class="form-control" placeholder="seu usuário" required autofocus/>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Senha</label>
              <div class="input-group">
                <input id="password" name="password" type="password"
                       class="form-control" placeholder="••••••" required/>
                <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                  <i class="bi bi-eye" id="pwdIcon"></i>
                </button>
              </div>
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
            </div>
          </form>
        </div>
      </div>
      <p class="text-center mt-3 text-muted">
        Não tem conta? <a th:href="@{/register}" class="text-decoration-none">Cadastre-se</a>
      </p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('togglePwd').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('pwdIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      pwd.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  });
</script>
</body>
</html>
