<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${mode == 'new'} ? 'Novo Livro' : 'Editar Livro'">Livro — Minha Biblioteca</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="bg-body-secondary">

<div th:replace="~{fragments/nav :: navbar}"></div>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a th:href="@{/dashboard}">Acervo</a></li>
          <li class="breadcrumb-item active" th:text="${mode == 'new'} ? 'Novo Livro' : 'Editar'"></li>
        </ol>
      </nav>

      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 pt-4 px-4">
          <h2 class="h5 fw-bold mb-0">
            <i class="bi bi-book me-2 text-primary"></i>
            <span th:text="${mode == 'new'} ? 'Adicionar Livro' : 'Editar Livro'"></span>
          </h2>
        </div>
        <div class="card-body p-4">

          <!-- ISBN Lookup -->
          <div th:if="${mode == 'new'}" class="alert alert-info d-flex align-items-center gap-3 mb-4">
            <i class="bi bi-info-circle-fill flex-shrink-0"></i>
            <div class="flex-fill">
              Tem o ISBN? <strong>Preencha abaixo</strong> para buscar os dados automaticamente.
            </div>
            <div class="input-group" style="max-width:260px">
              <input type="text" id="isbnLookup" class="form-control form-control-sm" placeholder="Ex: 9780132350884"/>
              <button class="btn btn-info btn-sm" type="button" onclick="lookupIsbn()">
                <i class="bi bi-search"></i>
              </button>
            </div>
          </div>

          <form id="bookForm" th:action="${mode == 'new'} ? @{/api/books} : @{/api/books/{id}(id=${book.id})}"
                method="post" novalidate>

            <div class="row g-3">
              <div class="col-md-8">
                <label class="form-label">Título <span class="text-danger">*</span></label>
                <input id="title" name="title" type="text" class="form-control"
                       th:value="${book.title}" required maxlength="255"/>
                <div class="invalid-feedback">Título é obrigatório</div>
              </div>
              <div class="col-md-4">
                <label class="form-label">Ano de Publicação</label>
                <input id="publishedYear" name="publishedYear" type="number" class="form-control"
                       th:value="${book.publishedYear}" min="1000" max="2100" placeholder="Ex: 2008"/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Autor <span class="text-danger">*</span></label>
                <input id="author" name="author" type="text" class="form-control"
                       th:value="${book.author}" required maxlength="255"/>
                <div class="invalid-feedback">Autor é obrigatório</div>
              </div>
              <div class="col-md-6">
                <label class="form-label">ISBN</label>
                <input id="isbn" name="isbn" type="text" class="form-control"
                       th:value="${book.isbn}" placeholder="Ex: 9780132350884"/>
              </div>
              <div class="col-md-6">
                <label class="form-label">Gênero</label>
                <input id="genre" name="genre" type="text" class="form-control"
                       th:value="${book.genre}" placeholder="Ex: Tecnologia, Romance..."/>
              </div>
              <div class="col-md-3">
                <label class="form-label">Status</label>
                <select id="status" name="status" class="form-select">
                  <option th:each="s : ${statuses}"
                          th:value="${s}"
                          th:text="${s.name() == 'WANT_TO_READ'} ? 'Quero Ler' : (${s.name() == 'READING'} ? 'Lendo' : 'Lido')"
                          th:selected="${book.status != null and book.status == s}"></option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Avaliação</label>
                <select id="rating" name="rating" class="form-select">
                  <option value="">—</option>
                  <option th:each="i : ${#numbers.sequence(1,5)}"
                          th:value="${i}" th:text="${i} + ' ★'"
                          th:selected="${book.rating != null and book.rating == i}"></option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">URL da Capa</label>
                <input id="coverUrl" name="coverUrl" type="url" class="form-control"
                       th:value="${book.coverUrl}" placeholder="https://..."/>
              </div>
              <div class="col-12">
                <label class="form-label">Sinopse</label>
                <textarea id="synopsis" name="synopsis" class="form-control" rows="4"
                          maxlength="2000" th:text="${book.synopsis}"
                          placeholder="Breve descrição do livro..."></textarea>
              </div>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-4">
              <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Cancelar</a>
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-1"></i>
                <span th:text="${mode == 'new'} ? 'Adicionar' : 'Salvar'"></span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:inline="javascript">
  const MODE = /*[[${mode}]]*/ 'new';
  const BOOK_ID = /*[[${book != null ? book.id : ''}]]*/ '';

  document.getElementById('bookForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const method = MODE === 'new' ? 'POST' : 'PUT';
    const url = MODE === 'new' ? '/api/books' : '/api/books/' + BOOK_ID;
    const payload = {
      title: document.getElementById('title').value,
      author: document.getElementById('author').value,
      isbn: document.getElementById('isbn').value || null,
      genre: document.getElementById('genre').value || null,
      publishedYear: document.getElementById('publishedYear').value ? parseInt(document.getElementById('publishedYear').value) : null,
      synopsis: document.getElementById('synopsis').value || null,
      coverUrl: document.getElementById('coverUrl').value || null,
      status: document.getElementById('status').value,
      rating: document.getElementById('rating').value ? parseInt(document.getElementById('rating').value) : null
    };
    const res = await fetch(url, {
      method,
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      window.location.href = '/dashboard';
    } else {
      const err = await res.json();
      showToast(err.message || 'Erro ao salvar', 'danger');
    }
  });

  async function lookupIsbn() {
    const isbn = document.getElementById('isbnLookup').value.replace(/\D/g, '');
    if (!isbn) return;
    const res = await fetch('/api/external/lookup?isbn=' + isbn);
    if (!res.ok) { showToast('ISBN não encontrado', 'warning'); return; }
    const data = await res.json();
    if (data.title) document.getElementById('title').value = data.title;
    if (data.author) document.getElementById('author').value = data.author;
    if (data.publishedYear) document.getElementById('publishedYear').value = data.publishedYear;
    if (data.synopsis) document.getElementById('synopsis').value = data.synopsis;
    if (data.coverUrl) document.getElementById('coverUrl').value = data.coverUrl;
    document.getElementById('isbn').value = isbn;
    showToast('Dados preenchidos com sucesso!', 'success');
  }
</script>
</body>
</html>
