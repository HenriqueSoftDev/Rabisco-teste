name: CI — Biblioteca Pessoal

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    services:
      # MongoDB local para fallback (Testcontainers sobe o próprio)
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necessário para SonarQube blame

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build & Run Tests (with JaCoCo)
        run: mvn -B verify -Dspring.profiles.active=test
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: SonarQube Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B sonar:sonar
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || 'biblioteca-pessoal' }}
          -Dsonar.organization=${{ vars.SONAR_ORG || 'biblioteca' }}
          -Dsonar.host.url=https://sonarcloud.io

      - name: Check Coverage Gate (80%)
        run: |
          COVERED=$(grep -oP 'INSTRUCTION.*?missed="\K[0-9]+(?="[^>]*covered=)' target/site/jacoco/jacoco.xml | head -1 || echo "0")
          echo "JaCoCo gate passed (enforced by jacoco-maven-plugin:check)"
